<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitmach-Quiz · Tag der offenen Tür</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EC;
    --paper-2:#F3EADA;
    --ink:#243239;
    --ink-soft:#5A6B72;
    --teal:#0E9E8E;
    --teal-deep:#0A7C70;
    --coral:#FF7A59;
    --sun:#FFC857;
    --green:#2FB37A;
    --green-bg:#E4F6EC;
    --red:#E15B5B;
    --red-bg:#FBE7E5;
    --line:#E4D8C4;
    --shadow:0 14px 36px -16px rgba(36,50,57,.32);
    --shadow-sm:0 6px 18px -10px rgba(36,50,57,.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 700px at 12% -10%, #FFF6E0 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 0%, #E2F4F0 0%, transparent 50%),
      var(--paper);
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(36,50,57,.045) 1px, transparent 1px);
    background-size:22px 22px;
  }
  .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:26px 18px 90px;}

  /* Top bar */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .badge-logo{
    width:46px;height:46px;border-radius:14px;flex:0 0 auto;
    display:grid;place-items:center;font-size:24px;
    background:linear-gradient(150deg,var(--teal),var(--teal-deep));
    box-shadow:var(--shadow-sm);
  }
  .topbar .eyebrow{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--teal-deep);font-weight:800;}
  .topbar h1{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.32rem;margin:1px 0 0;line-height:1.1;}

  /* Progress */
  .progress-shell{height:11px;border-radius:99px;background:var(--paper-2);box-shadow:inset 0 1px 3px rgba(36,50,57,.12);overflow:hidden;border:1px solid var(--line);}
  .progress-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--sun),var(--coral));transition:width .45s cubic-bezier(.4,0,.2,1);}
  .progress-meta{display:flex;justify-content:space-between;align-items:baseline;margin:8px 2px 0;font-size:.82rem;color:var(--ink-soft);font-weight:700;}
  .progress-meta .score b{color:var(--teal-deep);}

  /* Card */
  .card{
    background:#fff;border:1px solid var(--line);border-radius:24px;
    box-shadow:var(--shadow);padding:26px 24px;margin-top:18px;
    animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px) scale(.99);}to{opacity:1;transform:none;}}

  /* Start screen */
  .hero{text-align:center;padding:34px 22px;}
  .hero .emoji-row{font-size:2.4rem;letter-spacing:6px;margin-bottom:10px;}
  .hero h2{font-family:'Fredoka',sans-serif;font-weight:600;font-size:2rem;margin:6px 0 6px;line-height:1.08;}
  .hero p{color:var(--ink-soft);font-size:1.04rem;max-width:42ch;margin:0 auto 8px;}
  .hero .meta-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:18px 0 24px;}
  .chip{background:var(--paper-2);border:1px solid var(--line);border-radius:99px;padding:6px 14px;font-weight:700;font-size:.85rem;color:var(--ink);}

  /* Theme intro */
  .theme-head{display:flex;gap:14px;align-items:flex-start;margin-bottom:4px;}
  .theme-emoji{
    width:54px;height:54px;flex:0 0 auto;border-radius:16px;display:grid;place-items:center;font-size:30px;
    background:linear-gradient(150deg,#FFF3D6,#FFE2C2);border:1px solid #F0DCB6;
  }
  .theme-kicker{font-family:'Fredoka',sans-serif;font-weight:600;color:var(--teal-deep);font-size:1.12rem;line-height:1.1;}
  .scenario{
    background:linear-gradient(180deg,#FFFCF4,#FFF7E8);border:1px dashed #E7C98C;border-radius:16px;
    padding:14px 16px;margin:14px 0 6px;font-size:.97rem;color:#5b4a2e;
  }
  .scenario .quote{font-style:italic;}
  .scenario-img{
    display:block;width:100%;max-width:100%;height:auto;border-radius:14px;
    margin:14px 0 2px;border:1px solid var(--line);box-shadow:var(--shadow-sm);
  }

  /* Question */
  .q-num{font-weight:800;color:var(--coral);font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;margin-top:18px;}
  .q-text{font-family:'Fredoka',sans-serif;font-weight:500;font-size:1.24rem;line-height:1.3;margin:4px 0 18px;}

  .options{display:flex;flex-direction:column;gap:11px;}
  .opt{
    display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;
    background:#fff;border:2px solid var(--line);border-radius:15px;padding:13px 15px;
    font-family:inherit;font-size:1.02rem;font-weight:600;color:var(--ink);
    transition:transform .12s ease,border-color .18s,background .18s,box-shadow .18s;
  }
  .opt:hover:not(:disabled){border-color:var(--teal);transform:translateY(-2px);box-shadow:var(--shadow-sm);}
  .opt:disabled{cursor:default;}
  .opt .key{
    width:30px;height:30px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;
    background:var(--paper-2);font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;color:var(--ink);
    transition:background .18s,color .18s;
  }
  .opt .label{flex:1;}
  .opt .mark{font-size:1.2rem;opacity:0;transition:opacity .2s;width:22px;text-align:center;}

  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.correct .key{background:var(--green);color:#fff;}
  .opt.correct .mark{opacity:1;color:var(--green);}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .opt.wrong .key{background:var(--red);color:#fff;}
  .opt.wrong .mark{opacity:1;color:var(--red);}
  .opt.dim{opacity:.55;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.025);}100%{transform:scale(1);}}
  .opt.correct,.opt.wrong{animation:pop .35s ease;}

  /* Feedback */
  .feedback{
    margin-top:16px;border-radius:15px;padding:14px 16px;display:none;
    animation:rise .35s ease both;font-size:.98rem;
  }
  .feedback.show{display:block;}
  .feedback.good{background:var(--green-bg);border:1px solid #BBE6CC;}
  .feedback.bad{background:var(--red-bg);border:1px solid #F2C9C6;}
  .feedback .verdict{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.05rem;margin-bottom:3px;}
  .feedback.good .verdict{color:var(--green);}
  .feedback.bad .verdict{color:var(--red);}
  .feedback .explain{color:var(--ink);}
  .feedback .explain b{color:var(--teal-deep);}

  /* Buttons */
  .btn{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.06rem;border:none;cursor:pointer;
    border-radius:14px;padding:14px 26px;color:#fff;
    background:linear-gradient(150deg,var(--teal),var(--teal-deep));
    box-shadow:var(--shadow-sm);transition:transform .12s ease,box-shadow .18s,filter .18s;
  }
  .btn:hover{transform:translateY(-2px);filter:brightness(1.05);box-shadow:var(--shadow);}
  .btn:active{transform:translateY(0);}
  .btn.coral{background:linear-gradient(150deg,var(--coral),#F0623E);}
  .btn.ghost{background:transparent;color:var(--teal-deep);box-shadow:none;border:2px solid var(--line);}
  .btn.ghost:hover{border-color:var(--teal);filter:none;}
  .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

  /* Result */
  .result{text-align:center;padding:26px 18px 30px;}
  .result .donut{position:relative;width:168px;height:168px;margin:6px auto 18px;}
  .result .donut svg{transform:rotate(-90deg);}
  .result .donut .ring-bg{fill:none;stroke:var(--paper-2);stroke-width:16;}
  .result .donut .ring-fg{fill:none;stroke:url(#grad);stroke-width:16;stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.3,.8,.3,1);}
  .result .donut .center{position:absolute;inset:0;display:grid;place-content:center;}
  .result .donut .big{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2.4rem;line-height:1;color:var(--ink);}
  .result .donut .small{font-size:.82rem;color:var(--ink-soft);font-weight:700;}
  .result h2{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.7rem;margin:4px 0 6px;}
  .result p{color:var(--ink-soft);max-width:40ch;margin:0 auto 22px;font-size:1.03rem;}

  .footer-note{text-align:center;color:var(--ink-soft);font-size:.8rem;margin-top:26px;opacity:.8;}

  /* Confetti */
  .confetti{position:fixed;top:-12px;width:10px;height:14px;z-index:50;pointer-events:none;border-radius:2px;}
  @keyframes fall{to{transform:translateY(112vh) rotate(720deg);opacity:.9;}}

  @media (max-width:480px){
    .hero h2{font-size:1.7rem;}
    .q-text{font-size:1.12rem;}
    .card{padding:22px 17px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="badge-logo">🩺</div>
    <div>
      <div class="eyebrow">Tag der offenen Tür</div>
      <h1>Mitmach-Quiz</h1>
    </div>
  </div>

  <div id="progress-area" style="display:none;">
    <div class="progress-shell"><div class="progress-fill" id="bar"></div></div>
    <div class="progress-meta">
      <span id="counter">Frage 1 von 11</span>
      <span class="score">Punkte: <b id="scoreNow">0</b></span>
    </div>
  </div>

  <div id="stage"></div>

  <div class="footer-note">Ein kleines Quiz rund um Medizin &amp; Gesundheit – mit Augenzwinkern. 🎈</div>
</div>

<script>
const QUIZ = [
  {
    theme: "Thema 1 · Lumbalgie & Dermatome",
    emoji: "🦵",
    image: "figures/Lumbalgie.PNG",
    scenario: 'Herr Müller (43) kommt ins Gesundheitsamt und klagt: <span class="quote">„Frau Doktor, seit ich letzte Woche meinen Kühlschrank alleine in den dritten Stock getragen habe, schießt mir ein Schmerz vom Rücken bis in den großen Zeh!"</span> Der markierte Schmerzverlauf zieht vom Rücken über die Außenseite des Beins bis zur Großzehe.',
    questions: [
      { q:"Welche Nervenwurzel ist hier vermutlich betroffen?",
        options:["L4 – der „Schienbein-Spezialist“","L5 – der „Großzehen-Versorger“","S1 – der „Fersen-Flüsterer“","C7 – die ist vom Hals abgerutscht","Weiß nicht"],
        correct:1,
        explain:"L5 versorgt klassischerweise den Fußrücken und die Großzehe – genau dorthin zieht der Schmerz." },
      { q:"Warum verläuft der Schmerz bei einem Bandscheibenvorfall in einem so charakteristischen Streifenmuster?",
        options:["Die Bandscheibe hat einen eingebauten Navigationschip","Die Nervenwurzeln versorgen jeweils bestimmte Hautareale (Dermatome)","Der Schmerz nimmt immer den kürzesten Weg","Das Tape war im Angebot und nur in dieser Länge verfügbar","Weiß nicht"],
        correct:1,
        explain:"Jede Nervenwurzel versorgt ein fest umrissenes Hautareal – ein Dermatom. Daher das typische „Streifen“-Muster." },
      { q:"Welcher einfache klinische Test käme bei Verdacht auf einen Bandscheibenvorfall mit Nervenbeteiligung in Frage?",
        options:["Den Patienten fragen, ob er heute gut geschlafen hat","Lasègue-Test: Anheben des gestreckten Beines","Nachschauen, ob die Socken zum Outfit passen","Dreimal auf den Rücken klopfen und „Gesundheit“ sagen","Weiß nicht"],
        correct:1,
        explain:"Beim Lasègue-Test wird das gestreckte Bein angehoben; treten dabei Schmerzen auf, spricht das für eine Nervenwurzelreizung." }
    ]
  },
  {
    theme: "Thema 2 · Das Geheimnis des schäumenden Urins",
    emoji: "🧪",
    image: "figures/Urin.PNG",
    scenario: 'Frau Schmidt (45) berichtet besorgt: <span class="quote">„Mein Urin schäumt neuerdings so!“</span> Sie nicken wissend …',
    questions: [
      { q:"Was könnte medizinisch hinter stark schäumendem Urin stecken?",
        options:["Die Patientin hat zu viel Sekt getrunken","Erhöhter Eiweißgehalt im Urin (Proteinurie)","Die Toilette braucht dringend eine Entkalkung","Ein Zeichen von übermäßiger Freude","Weiß nicht"],
        correct:1,
        explain:"Schäumender Urin kann auf vermehrtes Eiweiß im Urin – eine Proteinurie – hindeuten." },
      { q:"Bei welcher Erkrankung ist schäumender Urin ein häufiges Warnsignal?",
        options:["Nierenerkrankung mit Eiweißverlust","Übermäßiger Kaffeekonsum","Chronische Langeweile","Zu häufiges Händewaschen","Weiß nicht"],
        correct:0,
        explain:"Anhaltende Proteinurie ist ein wichtiges Warnsignal für eine Nierenerkrankung mit Eiweißverlust." }
    ]
  },
  {
    theme: "Thema 3 · Die Medikamenten-Schatztruhe",
    emoji: "💊",
    image: "figures/Medikamente.jpg",
    scenario: 'Eine ältere Patientin hat ihren gesamten Medikamentenschrank mitgebracht – ein Berg aus Schachteln: Paracetamol, Aspirin (ASS), Novaminsulfon, Ibuprofen, Metformin, Simvastatin, Omeprazol, Pantoprazol. Sie fragt: <span class="quote">„Welches davon ist gegen meine Kopfschmerzen?“</span>',
    questions: [
      { q:"Welches der folgenden Medikamente wird typischerweise bei Kopfschmerzen eingesetzt?",
        options:["Metformin – der Zuckerzähmer","Ibuprofen – der Fiebersenker","Simvastatin – der Cholesterinsenker","Omeprazol – der Magenschützer","Weiß nicht"],
        correct:1,
        explain:"Ibuprofen ist ein entzündungshemmendes Schmerz- und Fiebermittel (NSAR) und wird klassisch bei Kopfschmerzen genutzt." },
      { q:"Finden Sie das Medikament, das KEIN Schmerzmittel ist! (Suchen Sie den Eindringling)",
        options:["Paracetamol","Aspirin (ASS)","Pantoprazol","Novaminsulfon","Weiß nicht"],
        correct:2,
        explain:"Pantoprazol ist ein Protonenpumpenhemmer (Magenschutz) – und damit kein Schmerzmittel." },
      { q:"Was verrät uns die Endung „-pril“ bei Medikamenten wie Ramipril oder Enalapril?",
        options:["Der Erfinder hieß Dr. Pril","Es handelt sich um ACE-Hemmer gegen Bluthochdruck","Die Medikamente wurden im April entdeckt","Sie sind alle prillig gut","Weiß nicht"],
        correct:1,
        explain:"Die Endung „-pril“ kennzeichnet ACE-Hemmer, die u. a. zur Behandlung von Bluthochdruck eingesetzt werden." }
    ]
  },
  {
    theme: "Thema 4 · Das Krümelmonster-Syndrom",
    emoji: "🍪",
    image: "figures/Kruemelmonster.jpg",
    scenario: 'Das Krümelmonster (Alter: vermutlich ewig) stellt sich vor. Hauptbeschwerde: <span class="quote">„Krümelmonster futtert Kekse den ganzen Tag! Fühlt sich nicht mehr so gut. Krümelmonster hat immer Durst!“</span> Vor ihm: ein Berg leerer Kekspackungen.',
    questions: [
      { q:"Welche Laboruntersuchung sollte beim Krümelmonster dringend durchgeführt werden?",
        options:["Krümelzählung im Fell","Blutzuckermessung","Keksverträglichkeitstest","Pupillencheck auf Cookie-Abhängigkeit","Weiß nicht"],
        correct:1,
        explain:"Großer Durst (Polydipsie) bei exzessivem Zuckerkonsum sind klassische Diabetes-Zeichen – die Blutzuckermessung gehört dringend gemacht." },
      { q:"Wie viele Kalorien hat ein durchschnittlicher Schokokeks ungefähr?",
        options:["Ca. 5 kcal – praktisch ein Salatblatt","Ca. 50 kcal – eine kleine Sünde","Ca. 500 kcal – ein halbes Mittagessen","Kekse haben keine Kalorien, wenn man sie schnell genug isst","Weiß nicht"],
        correct:1,
        explain:"Ein durchschnittlicher Schokokeks schlägt mit rund 50 kcal zu Buche – eine kleine Sünde eben." },
      { q:"Welcher Snack wäre für das reformwillige Krümelmonster am gesündesten?",
        options:["Eine Handvoll Nüsse – Mjam mjam mjam!","Eine Packung Gummibärchen – sind ja aus Fruchtsaft","Cookies aus dem Bio-Laden – Bio heißt gesund","Schokolade – ist ja auch aus Pflanzen (Kakao)","Weiß nicht"],
        correct:0,
        explain:"Eine Handvoll Nüsse liefert gesunde Fette, Eiweiß und Nährstoffe – der mit Abstand beste Snack im Vergleich." }
    ]
  }
];

// Flatten with theme bookkeeping
const FLAT = [];
QUIZ.forEach((t, ti) => {
  t.questions.forEach((q, qi) => {
    FLAT.push({...q, theme:t.theme, emoji:t.emoji,
      scenario: qi===0 ? t.scenario : null,
      image: (qi===0 || (ti===2 && qi===1)) ? t.image : null,
      themeIndex:ti, label:`Frage ${ti+1}.${qi+1}`});
  });
});
const TOTAL = FLAT.length;
const KEYS = ["A","B","C","D","E"];

let current = 0, score = 0, answered = false;

const stage = document.getElementById('stage');
const progressArea = document.getElementById('progress-area');

function startScreen(){
  progressArea.style.display='none';
  stage.innerHTML = `
    <div class="card hero">
      <div class="emoji-row">🦵 🧪 💊 🍪</div>
      <h2>Wie fit sind Sie in Sachen Gesundheit?</h2>
      <p>Vier kleine Geschichten aus dem Praxisalltag – und elf Fragen mit einem kräftigen Augenzwinkern. Nach jeder Antwort sehen Sie sofort die richtige Lösung.</p>
      <div class="meta-chips">
        <span class="chip">⏱️ ca. 4 Minuten</span>
        <span class="chip">❓ 11 Fragen</span>
        <span class="chip">🎯 Sofort-Auflösung</span>
      </div>
      <button class="btn coral" onclick="begin()">Quiz starten →</button>
    </div>`;
}

function begin(){ current=0; score=0; progressArea.style.display='block'; renderQuestion(); }

function renderQuestion(){
  answered=false;
  const item = FLAT[current];
  document.getElementById('bar').style.width = ((current)/TOTAL*100)+'%';
  document.getElementById('counter').textContent = `Frage ${current+1} von ${TOTAL}`;
  document.getElementById('scoreNow').textContent = score;

  const imgHTML = item.image ? `<img class="scenario-img" src="${item.image}" alt="${item.theme}">` : '';
  const scenarioHTML = item.scenario ? `
    <div class="theme-head">
      <div class="theme-emoji">${item.emoji}</div>
      <div><div class="theme-kicker">${item.theme}</div></div>
    </div>
    <div class="scenario">${item.scenario}</div>${imgHTML}` : `
    <div class="theme-head">
      <div class="theme-emoji">${item.emoji}</div>
      <div><div class="theme-kicker">${item.theme}</div></div>
    </div>${imgHTML}`;

  const opts = item.options.map((o,i)=>`
    <button class="opt" data-i="${i}" onclick="choose(${i})">
      <span class="key">${KEYS[i]}</span>
      <span class="label">${o}</span>
      <span class="mark"></span>
    </button>`).join('');

  stage.innerHTML = `
    <div class="card">
      ${scenarioHTML}
      <div class="q-num">${item.label}</div>
      <div class="q-text">${item.q}</div>
      <div class="options" id="options">${opts}</div>
      <div class="feedback" id="feedback"></div>
      <div class="actions" id="actions"></div>
    </div>`;
}

function choose(i){
  if(answered) return;
  answered=true;
  const item = FLAT[current];
  const correct = item.correct;
  const buttons = [...document.querySelectorAll('.opt')];
  buttons.forEach(b=>{
    b.disabled=true;
    const idx=+b.dataset.i;
    if(idx===correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
    else if(idx===i){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✕'; }
    else { b.classList.add('dim'); }
  });

  const right = i===correct;
  if(right) score++;
  document.getElementById('scoreNow').textContent = score;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (right?'good':'bad');
  const verdict = right ? 'Richtig! 🎉'
    : (i===4 ? 'Kein Problem – hier die Lösung:' : 'Knapp daneben!');
  fb.innerHTML = `<div class="verdict">${verdict}</div>
    <div class="explain"><b>${KEYS[correct]})</b> ${item.explain}</div>`;

  const isLast = current === TOTAL-1;
  document.getElementById('actions').innerHTML =
    `<button class="btn" onclick="next()">${isLast?'Ergebnis ansehen 🏁':'Weiter →'}</button>`;
}

function next(){
  if(current < TOTAL-1){ current++; renderQuestion(); }
  else { showResult(); }
}

function showResult(){
  document.getElementById('bar').style.width='100%';
  document.getElementById('counter').textContent=`Geschafft!`;
  const pct = Math.round(score/TOTAL*100);
  let title, msg;
  if(pct>=90){ title='Diagnose: Spitzenklasse! 🩺'; msg='Beeindruckend – Sie könnten glatt die Sprechstunde übernehmen.'; }
  else if(pct>=70){ title='Diagnose: richtig gut! 👏'; msg='Ein starkes Ergebnis. Da steckt eine Menge Gesundheitswissen drin.'; }
  else if(pct>=40){ title='Diagnose: solide! 🙂'; msg='Gute Basis – mit ein bisschen Stöbern wird daraus glatt Expertenwissen.'; }
  else { title='Diagnose: Lust auf mehr? 🌱'; msg='Macht nichts – Hauptsache, Sie hatten Spaß. Probieren Sie es gern noch einmal!'; }

  const r=74, circ=2*Math.PI*r, offset=circ*(1-score/TOTAL);
  stage.innerHTML = `
    <div class="card result">
      <div class="donut">
        <svg width="168" height="168" viewBox="0 0 168 168">
          <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFC857"/><stop offset="100%" stop-color="#FF7A59"/>
          </linearGradient></defs>
          <circle class="ring-bg" cx="84" cy="84" r="${r}"/>
          <circle class="ring-fg" cx="84" cy="84" r="${r}"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="ring"/>
        </svg>
        <div class="center"><div class="big">${score}/${TOTAL}</div><div class="small">${pct}% richtig</div></div>
      </div>
      <h2>${title}</h2>
      <p>${msg}</p>
      <button class="btn coral" onclick="restart()">Noch einmal spielen ↻</button>
    </div>`;
  requestAnimationFrame(()=>{ setTimeout(()=>{ document.getElementById('ring').style.strokeDashoffset=offset; },80); });
  if(pct>=70) burstConfetti();
}

function restart(){ startScreen(); }

function burstConfetti(){
  const colors=['#FFC857','#FF7A59','#0E9E8E','#2FB37A','#E15B5B'];
  for(let i=0;i<90;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.opacity=0.9;
    const dur=2.6+Math.random()*1.8, delay=Math.random()*0.5;
    c.style.animation=`fall ${dur}s ${delay}s cubic-bezier(.3,.6,.5,1) forwards`;
    c.style.transform=`translateY(0) rotate(${Math.random()*360}deg)`;
    if(Math.random()>.5) c.style.borderRadius='50%';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),(dur+delay)*1000+200);
  }
}

startScreen();
</script>
</body>
</html>
